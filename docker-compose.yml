services:
  # 1. Database Service
  db:
    image: postgres:15-alpine
    container_name: sass-inventory-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Express App Service (Backend)
  app:
    build: .
    container_name: sass-inventory-app
    ports:
      - '5000:5000'
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - APPLICATION_PORT=${APPLICATION_PORT}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    # এক কমান্ডে মাইগ্রেশন, সিড এবং রান
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run dev"

  # 3. React Client Service (Frontend)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sass-inventory-client
    ports:
      - '3000:3000'
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - WDS_SOCKET_PORT=0
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
    depends_on:
      - app

  # 4. pgAdmin Service
  pgadmin:
    image: dpage/pgadmin4
    container_name: sass-inventory-pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - '5050:80'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
